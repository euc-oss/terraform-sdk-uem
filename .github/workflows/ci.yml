name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.9.0

  test:
    name: Test (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ['1.25', '1.26']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - name: Run tests with coverage
        # Instrument only handwritten + service-layer packages for coverage.
        # Skipping the swagger-transcribed model/service stubs under
        # internal/mam and internal/mdm; those are codegen output and aren't
        # directly unit-tested. The 50% threshold below would be unreachable
        # otherwise.
        run: TEST_MODE=mock go test ./... -race -coverprofile=coverage.out -coverpkg=./client/...,./models/...,./resources/...,./internal/mockserver/...,./internal/services/...,./
      - name: Enforce coverage threshold
        if: matrix.go == '1.25'
        run: |
          coverage=$(go tool cover -func=coverage.out | grep total: | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${coverage}%"
          awk -v c="$coverage" 'BEGIN { if (c+0 < 50) { print "Coverage below minimum (50%)"; exit 1 } }'

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go build ./...
